name: Create Resource by Terraform

on:
  workflow_dispatch:
    inputs:
      resource:
        description: "Select resource to create"
        required: true
        type: choice
        options:
          - ec2
          - s3

      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod

      name:
        description: "Enter resource name (lowercase, no spaces)"
        required: true

      confirm:
        description: "Type YES to confirm"
        required: true

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restrict User Access
        run: |
          ALLOWED_USERS=("Poornesh0")

          if [[ ! " ${ALLOWED_USERS[@]} " =~ " ${{ github.actor }} " ]]; then
          echo "❌ User '${{ github.actor }}' is NOT authorized to run this workflow"
          exit 1
          fi

          echo "✅ User '${{ github.actor }}' is authorized"

      - name: Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "❌ Confirmation failed. Type YES to proceed."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="resource_type=${{ github.event.inputs.resource }}" \
            -var="env=${{ github.event.inputs.environment }}" \
            -var="name=${{ github.event.inputs.name }}"

  apply:
    needs: plan
    runs-on: ubuntu-latest

    # 🔥 Approval controlled by GitHub Environment
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restrict User Access
        run: |
          ALLOWED_USERS=("Poornesh0")

          if [[ ! " ${ALLOWED_USERS[@]} " =~ " ${{ github.actor }} " ]]; then
          echo "❌ User '${{ github.actor }}' is NOT authorized to run this workflow"
          exit 1
          fi

          echo "✅ User '${{ github.actor }}' is authorized"
          
      - name: Waiting for Approval
        run: echo "⏸️ Waiting for approval for ${{ github.event.inputs.environment }} environment"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="resource_type=${{ github.event.inputs.resource }}" \
            -var="env=${{ github.event.inputs.environment }}" \
            -var="name=${{ github.event.inputs.name }}"

      - name: Capture Terraform Outputs
        run: terraform output -json > tf-output.json

      - name: Show Outputs in Summary
        run: |
          echo "## 🚀 Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Instance ID | $(jq -r '.ec2_instance_id.value' tf-output.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Public IP | $(jq -r '.ec2_public_ip.value' tf-output.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Public DNS | $(jq -r '.ec2_public_dns.value' tf-output.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Type | $(jq -r '.resource_created.value' tf-output.json) |" >> $GITHUB_STEP_SUMMARY
