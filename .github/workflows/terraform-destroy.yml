name: Terraform Destroy Resource

on:
  workflow_dispatch:
    inputs:
      resource:
        description: "Select resource to destroy"
        required: true
        type: choice
        options:
          - ec2
          - s3
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      name:
        description: "Enter resource name to destroy"
        required: true
      instance_id:
        description: "EC2 Instance ID (e.g. i-0abc123) — only needed if not in state"
        required: false
      confirm:
        description: "Type DESTROY to confirm"
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔐 Restrict who can run
      - name: Restrict User
        run: |
          if [ "${{ github.actor }}" != "Poornesh00" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      # ✅ Validate DESTROY confirmation
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. You must type DESTROY to proceed."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="key=${{ github.event.inputs.environment }}/${{ github.event.inputs.resource }}/${{ github.event.inputs.name }}.tfstate"

      # ✅ FIXED: correct import address with [0] for count-based resources
      - name: Terraform Import (if instance_id provided)
        if: ${{ github.event.inputs.instance_id != '' }}
        run: |
          echo "Importing ${{ github.event.inputs.instance_id }} into state..."

          if [ "${{ github.event.inputs.resource }}" == "ec2" ]; then
            terraform import \
              -var="resource_type=${{ github.event.inputs.resource }}" \
              -var="env=${{ github.event.inputs.environment }}" \
              -var="name=${{ github.event.inputs.name }}" \
              'aws_instance.ec2[0]' ${{ github.event.inputs.instance_id }}

          elif [ "${{ github.event.inputs.resource }}" == "s3" ]; then
            terraform import \
              -var="resource_type=${{ github.event.inputs.resource }}" \
              -var="env=${{ github.event.inputs.environment }}" \
              -var="name=${{ github.event.inputs.name }}" \
              'aws_s3_bucket.s3[0]' ${{ github.event.inputs.instance_id }}
          fi

      # 🔍 Preview destroy
      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var="resource_type=${{ github.event.inputs.resource }}" \
            -var="env=${{ github.event.inputs.environment }}" \
            -var="name=${{ github.event.inputs.name }}" \
            -out=destroy.tfplan

      # 💣 Destroy
      - name: Terraform Destroy
        run: terraform apply -auto-approve destroy.tfplan

      # 📋 Success summary
      - name: Destroy Summary
        if: success()
        run: |
          echo "## 💣 Terraform Destroy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Type | ${{ github.event.inputs.resource }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Name | ${{ github.event.inputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance ID | ${{ github.event.inputs.instance_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroyed By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Destroyed ✅ |" >> $GITHUB_STEP_SUMMARY

      # ❌ Failure summary
      - name: Destroy Failed Summary
        if: failure()
        run: |
          echo "## ❌ Terraform Destroy FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Type | ${{ github.event.inputs.resource }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Name | ${{ github.event.inputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroyed By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ❌ Failed — check logs above |" >> $GITHUB_STEP_SUMMARY
